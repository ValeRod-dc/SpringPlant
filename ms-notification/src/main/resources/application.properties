spring.application.name=ms-notification
server.port=9099

spring.datasource.url=jdbc:mysql://localhost:3306/notification_bd
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

jwt.secret=una_clave_secreta_larga_y_segura_de_al_menos_32_bytes

eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# Feign timeouts
feign.client.config.default.connect-timeout=3000
feign.client.config.default.read-timeout=5000

#Nivel global
logging.level.root=INFO
#Tu package
logging.level.com.example.ms_notification=DEBUG
#Archivo de logs
logging.file.name=logs/ms-notification.log

