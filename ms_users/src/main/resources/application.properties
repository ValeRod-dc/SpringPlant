spring.application.name=ms-users
server.port=9090

# Nivel global
logging.level.root=INFO

# Tu package
logging.level.com.example.ms_users=DEBUG

# Archivo de logs
logging.file.name=logs/ms-users.log


# MySQL / DB
spring.datasource.url=jdbc:mysql://host.docker.internal:3306/users_db
spring.datasource.username=root
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# JWT
jwt.secret=una_clave_secreta_larga_y_segura_de_al_menos_32_bytes

# Logging
logging.level.org.springframework.security=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Eureka
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true