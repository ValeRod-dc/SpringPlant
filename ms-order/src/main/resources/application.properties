spring.application.name=ms-order
server.port=9003

# Nivel global
logging.level.root=INFO

# Tu package
logging.level.com.example.ms_order=DEBUG

# Archivo de logs
logging.file.name=logs/ms-order.log

#Base de Datos y Migraciones
spring.datasource.url=jdbc:mysql://localhost:3306/order_bd
spring.datasource.username=root
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

#Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# JWT
jwt.secret=una_clave_secreta_larga_y_segura_de_al_menos_32_bytes
#Eureka
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# Feign timeouts
feign.client.config.default.connect-timeout=3000
feign.client.config.default.read-timeout=5000

# Logging
logging.level.org.springframework.security=INFO
logging.level.org.flywaydb=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n