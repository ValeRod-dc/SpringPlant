services:
  ms-eureka:
    build: ./ms-eureka
    container_name: ms-eureka
    ports:
      - "8761:8761"
    networks:
      - microservices-network

  ms-product:
    build: ./ms-product
    container_name: ms-product
    ports:
      - "9000:9000"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - ms-eureka
    networks:
      - microservices-network

  ms-inventory:
    build: ./ms-inventory
    container_name: ms-inventory
    ports:
      - "9002:9002"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - ms-eureka
      - ms-product
    networks:
      - microservices-network

  ms-order:
    build: ./ms-order
    container_name: ms-order
    ports:
      - "9003:9003"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - ms-eureka
      - ms-product
    networks:
      - microservices-network

  ms-notification:
    build: ./ms-notification
    container_name: ms-notification
    ports:
      - "9099:9099"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - ms-eureka
    networks:
      - microservices-network

  ms-review:
    build: ./ms-review
    container_name: ms-review
    ports:
      - "9097:9097"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - ms-eureka
      - ms-product
      - ms-order
    networks:
      - microservices-network

  ms-users:
    build: ./ms-users
    container_name: ms-users
    ports:
      - "9090:9090"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - ms-eureka
    networks:
      - microservices-network

  ms-cart:
    build: ./ms-cart
    container_name: ms-cart
    ports:
      - "9092:9092"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - ms-eureka
    networks:
      - microservices-network

  ms-payment:
    build: ./ms-payment
    container_name: ms-payment
    ports:
      - "9094:9094"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - ms-eureka
    networks:
      - microservices-network

  ms-shipping:
    build: ./ms-shipping
    container_name: ms-shipping
    ports:
      - "9096:9096"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - ms-eureka
    networks:
      - microservices-network

  ms-discount:
    build: ./ms-discount
    container_name: ms-discount
    ports:
      - "9098:9098"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - ms-eureka
    networks:
      - microservices-network

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "9093:9093"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - ms-eureka
      - ms-product
      - ms-inventory
      - ms-order
      - ms-notification
      - ms-review
      - ms-users
      - ms-cart
      - ms-payment
      - ms-shipping
      - ms-discount
    networks:
      - microservices-network

networks:
  microservices-network:
    driver: bridge