spring.application.name=ms_discount
server.port=9098

spring.datasource.url=jdbc:mysql://localhost:3306/discount_db


# Nivel global
logging.level.root=INFO

# Tu package
logging.level.com.example.ms_discount=DEBUG

# Archivo de logs
logging.file.name=logs/ms_discount.log


# MySQL
spring.datasource.username=root
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true

# JWT
jwt.secret=una_clave_secreta_larga_y_segura_de_al_menos_32_bytes

# Logging
logging.level.org.springframework.security=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n