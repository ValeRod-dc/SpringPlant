spring.application.name=api-gateway
server.port=9093
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
spring.cloud.gateway.server.webflux.discovery.locator.enabled=true
spring.cloud.gateway.server.webflux.discovery.locator.lower-case-service-id=true

spring.cloud.gateway.server.webflux.routes[0].id=ms-users
spring.cloud.gateway.server.webflux.routes[0].uri=lb://ms-users
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/v1/users/**,/api/v1/admin/users/**,/api/v1/auth/**

spring.cloud.gateway.server.webflux.routes[1].id=ms-cart
spring.cloud.gateway.server.webflux.routes[1].uri=lb://ms-cart
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/v1/cart/**

