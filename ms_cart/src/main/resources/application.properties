spring.application.name=ms-cart
server.port=9092

# Nivel global
logging.level.root=INFO

# Tu package
logging.level.com.example.ms_cart=DEBUG

# Archivo de logs
logging.file.name=logs/ms_cart.log


# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/cart_db
spring.datasource.username=root
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# Eureka
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true

# JWT (debe coincidir con ms_users)
jwt.secret=una_clave_secreta_larga_y_segura_de_al_menos_32_bytes

# Logging
logging.level.org.springframework.security=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n